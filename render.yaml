services:
  - type: web
    name: eduwave-backend
    runtime: node
    rootDir: .
    buildCommand: npm ci --include=dev && npm --workspace backend run build
    startCommand: npm --workspace backend run prisma:deploy && npm --workspace backend run start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: eduwave-db
          property: connectionString
      - key: NODE_VERSION
        value: 20.18.0
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY_BASE64
        sync: false
      - key: NODE_ENV
        value: production
      - key: UPLOADS_PUBLIC_BASE_URL
        value: https://eduwave-backend.onrender.com/uploads

databases:
  - name: eduwave-db
    databaseName: eduwave
    user: eduwave_user
